<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FIFA World Cup 2026 - Signal Room</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Oswald:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.7/dist/chart.umd.min.js"></script>
<style>
:root {
  --fifa-purple: #5E17EB;
  --fifa-blue: #00A859;
  --fifa-gold: #FFD700;
  --fifa-dark: #0a0a1a;
  --fifa-card: #111128;
  --fifa-card-hover: #1a1a3a;
  --fifa-text: #ffffff;
  --fifa-text-dim: #a0a0c0;
  --fifa-border: #2a2a4a;
  --accent-live: #ff2d55;
  --accent-win: #00A859;
}
* { box-sizing: border-box; margin: 0; padding: 0 }
html { scroll-behavior: smooth }
body { font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: var(--fifa-dark); color: var(--fifa-text); line-height: 1.5; -webkit-font-smoothing: antialiased }
img { max-width: 100%; display: block }

.header { position: sticky; top: 0; z-index: 50; background: linear-gradient(135deg, #0a0a1a 0%, #151530 100%); border-bottom: 1px solid var(--fifa-border); padding: 0 }
.header-inner { max-width: 1200px; margin: 0 auto; padding: 1rem 1.5rem; display: flex; align-items: center; gap: 1rem; flex-wrap: wrap }
.header-badge { display: inline-flex; align-items: center; gap: 0.5rem; background: linear-gradient(135deg, var(--fifa-purple), #7c3aed); color: var(--fifa-gold); padding: 0.35rem 0.75rem; border-radius: 6px; font-family: 'Oswald', sans-serif; font-weight: 600; text-transform: uppercase; letter-spacing: 0.05em; font-size: 0.85rem; border: 1px solid rgba(255,215,0,0.2) }
.header-title { font-family: 'Oswald', sans-serif; font-weight: 700; font-size: 1.5rem; letter-spacing: 0.02em; flex: 1 }
.header-title span { color: var(--fifa-gold) }
.header-pills { display: flex; gap: 0.6rem; flex-wrap: wrap }
.header-pill { background: var(--fifa-card); border: 1px solid var(--fifa-border); padding: 0.3rem 0.6rem; border-radius: 20px; font-size: 0.75rem; color: var(--fifa-text-dim) }
.header-pill b { color: var(--fifa-text); font-weight: 600 }

.date-toggle { display: flex; align-items: center; gap: 0.5rem; margin-left: auto; }
.date-toggle label { font-size: 0.8rem; color: var(--fifa-text-dim); }
.date-toggle select { background: var(--fifa-card); color: var(--fifa-text); border: 1px solid var(--fifa-border); border-radius: 6px; padding: 0.4rem 0.8rem; font-family: 'Inter', sans-serif; font-size: 0.85rem; cursor: pointer; outline: none; }
.date-toggle select:hover, .date-toggle select:focus { border-color: var(--fifa-gold); }

.nav-tabs { position: sticky; top: 60px; z-index: 49; background: rgba(10,10,26,0.95); backdrop-filter: blur(10px); border-bottom: 1px solid var(--fifa-border); overflow-x: auto; white-space: nowrap }
.nav-tabs-inner { max-width: 1200px; margin: 0 auto; padding: 0 1.5rem; display: flex; gap: 0.25rem }
.tab-btn { background: transparent; border: none; color: var(--fifa-text-dim); cursor: pointer; padding: 0.75rem 1.25rem; font-family: 'Inter', sans-serif; font-weight: 500; font-size: 0.9rem; border-bottom: 2px solid transparent; transition: color 0.2s, border-color 0.2s, background 0.2s; border-radius: 6px 6px 0 0; position: relative }
.tab-btn:hover { color: var(--fifa-text); background: rgba(255,255,255,0.03) }
.tab-btn.active { color: var(--fifa-gold); border-bottom-color: var(--fifa-gold); background: rgba(94,23,235,0.08) }

.container { max-width: 1200px; margin: 0 auto; padding: 1.5rem }
.section-title { font-family: 'Oswald', sans-serif; font-weight: 600; font-size: 1.25rem; margin-bottom: 1rem; display: flex; align-items: center; gap: 0.5rem; letter-spacing: 0.01em }
.section { display: none; animation: fadeIn 0.4s ease }
.section.active { display: block }
@keyframes fadeIn { from { opacity: 0; transform: translateY(8px) } to { opacity: 1; transform: translateY(0) } }

.card { background: var(--fifa-card); border: 1px solid var(--fifa-border); border-radius: 12px; padding: 1rem; transition: transform 0.2s, box-shadow 0.2s, background 0.2s; position: relative; overflow: hidden; cursor: pointer; }
.card::before { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 2px; background: linear-gradient(90deg, transparent, var(--fifa-gold), var(--fifa-purple), transparent); background-size: 200% 100%; animation: shimmer 3s linear infinite; opacity: 0.7 }
@keyframes shimmer { 0% { background-position: -200% 0 } 100% { background-position: 200% 0 } }
.card:hover { background: var(--fifa-card-hover); transform: translateY(-2px); box-shadow: 0 8px 24px rgba(0,0,0,0.3) }

.match-cards { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 1rem }
.match-card { display: flex; flex-direction: column; gap: 0.5rem }
.match-card-header { display: flex; justify-content: space-between; align-items: center; font-size: 0.75rem; color: var(--fifa-text-dim) }
.match-live { display: flex; align-items: center; gap: 0.35rem; color: var(--accent-live); font-weight: 600 }
.match-live .dot { width: 6px; height: 6px; border-radius: 50%; background: var(--accent-live); animation: pulse 1.5s ease-in-out infinite }
@keyframes pulse { 0%, 100% { opacity: 1 } 50% { opacity: 0.3 } }
.match-teams { display: flex; align-items: center; justify-content: space-between; gap: 0.75rem }
.match-team { display: flex; align-items: center; gap: 0.5rem; flex: 1 }
.match-team.flag { width: 36px; height: 24px; border-radius: 3px; object-fit: cover; border: 1px solid rgba(255,255,255,0.1); background: #222 }
.match-team.name { font-weight: 600; font-size: 0.95rem }
.match-score { font-family: 'Oswald', sans-serif; font-weight: 700; font-size: 1.5rem; color: var(--fifa-gold); min-width: 60px; text-align: center }
.match-info { font-size: 0.75rem; color: var(--fifa-text-dim); display: flex; gap: 0.6rem; flex-wrap: wrap }

.match-importance { display: inline-flex; align-items: center; gap: 0.3rem; font-size: 0.7rem; font-weight: 600; padding: 0.15rem 0.5rem; border-radius: 10px; margin-top: 0.3rem; }
.match-prediction { margin-top: 0.25rem; padding-top: 0.5rem; border-top: 1px solid rgba(255,255,255,0.05); }
.pred-model-label { font-size: 0.65rem; color: var(--fifa-text-dim); margin-bottom: 0.3rem; display: flex; align-items: center; gap: 0.3rem; }
.pred-bar { height: 6px; border-radius: 3px; background: var(--fifa-border); overflow: hidden; display: flex }
.pred-bar-fill { height: 100%; border-radius: 3px }
.pred-home { background: var(--fifa-purple) }
.pred-draw { background: var(--fifa-text-dim) }
.pred-away { background: var(--fifa-blue) }
.pred-labels { display: flex; justify-content: space-between; font-size: 0.7rem; color: var(--fifa-text-dim); margin-top: 0.2rem }
.pred-confidence { display: inline-flex; align-items: center; gap: 0.3rem; font-size: 0.65rem; padding: 0.1rem 0.4rem; border-radius: 4px; margin-top: 0.3rem; }
.conf-high { background: rgba(0,168,89,0.2); color: #00e676; }
.conf-medium { background: rgba(255,215,0,0.2); color: var(--fifa-gold); }
.conf-low { background: rgba(255,45,85,0.2); color: #ff6b81; }
.pred-factors { font-size: 0.7rem; color: var(--fifa-text-dim); margin-top: 0.3rem; line-height: 1.4; }
.pred-factors span { display: block; }

.countdown { font-size: 0.75rem; color: var(--fifa-gold); font-weight: 600; margin-top: 0.3rem; }

.group-tables { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 1rem }
.group-table { overflow: auto; cursor: default; }
.group-table h3 { font-family: 'Oswald', sans-serif; font-weight: 600; font-size: 1rem; margin-bottom: 0.5rem; color: var(--fifa-gold) }
.gt-table { width: 100%; border-collapse: collapse; font-size: 0.85rem }
.gt-table th { text-align: left; padding: 0.5rem 0.4rem; color: var(--fifa-text-dim); font-weight: 500; border-bottom: 1px solid var(--fifa-border); white-space: nowrap }
.gt-table td { padding: 0.4rem 0.4rem; border-bottom: 1px solid rgba(255,255,255,0.04); vertical-align: middle }
.gt-table tr:hover td { background: rgba(255,255,255,0.03) }
.gt-team { display: flex; align-items: center; gap: 0.4rem }
.gt-team img { width: 24px; height: 16px; border-radius: 2px; object-fit: cover; border: 1px solid rgba(255,255,255,0.1) }
.gt-rank { width: 18px; height: 18px; border-radius: 50%; display: inline-flex; align-items: center; justify-content: center; font-size: 0.7rem; font-weight: 700 }
.rank-top { background: rgba(0,168,89,0.2); color: #00e676 }
.rank-third { background: rgba(255,215,0,0.2); color: var(--fifa-gold) }
.rank-else { background: rgba(255,255,255,0.08); color: var(--fifa-text-dim) }

.form-sparkline { display: flex; gap: 2px; }
.form-dot { width: 8px; height: 8px; border-radius: 50%; }
.form-dot.w { background: #00e676; }
.form-dot.d { background: var(--fifa-gold); }
.form-dot.l { background: #ff6b81; }

.strength-meter { display: flex; align-items: center; gap: 0.3rem; }
.strength-bar { width: 30px; height: 4px; border-radius: 2px; background: var(--fifa-border); overflow: hidden; }
.strength-fill { height: 100%; border-radius: 2px; background: linear-gradient(90deg, var(--fifa-purple), var(--fifa-gold)); }
.strength-val { font-size: 0.65rem; color: var(--fifa-text-dim); }

.stats-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 1rem }
.stat-card { text-align: center; padding: 1.25rem; cursor: default; }
.stat-value { font-family: 'Oswald', sans-serif; font-weight: 700; font-size: 2rem; color: var(--fifa-gold); line-height: 1 }
.stat-label { font-size: 0.8rem; color: var(--fifa-text-dim); margin-top: 0.25rem }
.top-scorers { margin-top: 1rem }
.scorer-list { display: flex; flex-direction: column; gap: 0.4rem }
.scorer-item { display: flex; align-items: center; gap: 0.75rem; padding: 0.5rem 0.75rem; background: rgba(255,255,255,0.03); border-radius: 8px; border: 1px solid rgba(255,255,255,0.05) }
.scorer-rank { font-family: 'Oswald', sans-serif; font-weight: 700; font-size: 1rem; color: var(--fifa-gold); width: 24px; text-align: center }
.scorer-name { font-weight: 600; font-size: 0.9rem; flex: 1 }
.scorer-team { font-size: 0.75rem; color: var(--fifa-text-dim) }
.scorer-goals { font-family: 'Oswald', sans-serif; font-weight: 700; font-size: 1.1rem; color: var(--fifa-text) }
.chart-wrap { margin-top: 1rem; height: 280px; position: relative }
.stadium-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: 1rem }
.stadium-card { cursor: default; }
.stadium-card h3 { font-family: 'Oswald', sans-serif; font-weight: 600; font-size: 1rem; margin-bottom: 0.25rem }
.stadium-card p { font-size: 0.8rem; color: var(--fifa-text-dim); margin-bottom: 0.25rem }
.stadium-meta { display: flex; gap: 0.5rem; font-size: 0.75rem; color: var(--fifa-text-dim); margin-top: 0.5rem; padding-top: 0.5rem; border-top: 1px solid var(--fifa-border) }

.circle-bracket-container { position: relative; width: 100%; max-width: 900px; margin: 0 auto; }
.circle-bracket-container svg { width: 100%; height: auto; display: block }
.cb-team { cursor: pointer; transition: opacity 0.2s }
.cb-team:hover { opacity: 1 }
.cb-team-image { width: 40px; height: 40px; border-radius: 50%; border: 2px solid var(--fifa-border); object-fit: cover; transition: transform 0.2s, border-color 0.2s; background: #222 }
.cb-team:hover .cb-team-image { transform: scale(1.15); border-color: var(--fifa-gold) }
.cb-team-name { font-size: 0.65rem; fill: var(--fifa-text); text-anchor: middle; font-family: 'Inter', sans-serif; font-weight: 600 }
.cb-line { stroke: var(--fifa-border); stroke-width: 1.5; fill: none; transition: stroke 0.2s }
.cb-line:hover, .cb-line.active { stroke: var(--fifa-gold); stroke-width: 2 }
.cb-center-text { font-family: 'Oswald', sans-serif; font-weight: 700; fill: var(--fifa-gold); text-anchor: middle; font-size: 1.2rem }
.cb-center-sub { font-family: 'Inter', sans-serif; fill: var(--fifa-text-dim); text-anchor: middle; font-size: 0.55rem }
.cb-round-label { font-family: 'Oswald', sans-serif; font-weight: 600; fill: var(--fifa-text-dim); text-anchor: middle; font-size: 0.65rem; text-transform: uppercase; letter-spacing: 0.05em }
.cb-trophy { font-size: 2rem }
.cb-strength { font-size: 0.5rem; fill: var(--fifa-text-dim); text-anchor: middle; }

.helper-text { font-size: 0.8rem; color: var(--fifa-text-dim); margin-bottom: 1rem }

/* Modal */
.modal-overlay { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.8); z-index: 100; display: none; align-items: center; justify-content: center; padding: 1rem; }
.modal-overlay.active { display: flex; }
.modal { background: var(--fifa-card); border: 1px solid var(--fifa-border); border-radius: 16px; max-width: 600px; width: 100%; max-height: 90vh; overflow-y: auto; position: relative; }
.modal-close { position: absolute; top: 1rem; right: 1rem; background: none; border: none; color: var(--fifa-text-dim); font-size: 1.5rem; cursor: pointer; }
.modal-close:hover { color: var(--fifa-text); }
.modal-header { padding: 1.5rem; border-bottom: 1px solid var(--fifa-border); }
.modal-body { padding: 1.5rem; }
.modal-teams { display: flex; align-items: center; justify-content: space-between; gap: 1rem; margin-bottom: 1rem; }
.modal-team { text-align: center; flex: 1; }
.modal-team img { width: 60px; height: 40px; border-radius: 4px; object-fit: cover; border: 1px solid var(--fifa-border); margin: 0 auto 0.5rem; }
.modal-team-name { font-weight: 700; font-size: 1.1rem; }
.modal-vs { font-family: 'Oswald', sans-serif; font-size: 1.5rem; color: var(--fifa-gold); }
.modal-prediction { background: rgba(94,23,235,0.1); border: 1px solid rgba(94,23,235,0.3); border-radius: 10px; padding: 1rem; margin: 1rem 0; }
.modal-stats-compare { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; margin-top: 1rem; }
.compare-item { text-align: center; padding: 0.75rem; background: rgba(255,255,255,0.03); border-radius: 8px; }
.compare-label { font-size: 0.75rem; color: var(--fifa-text-dim); margin-bottom: 0.3rem; }
.compare-val { font-weight: 700; font-size: 1.1rem; }
.compare-bar { height: 4px; border-radius: 2px; background: var(--fifa-border); margin-top: 0.3rem; overflow: hidden; display: flex; }
.compare-bar-fill { height: 100%; }

@media(max-width:640px) {
  .header-inner { padding: 0.75rem 1rem; flex-direction: column; align-items: flex-start; }
  .header-title { font-size: 1.15rem }
  .date-toggle { margin-left: 0; margin-top: 0.5rem; }
  .nav-tabs-inner { padding: 0 1rem }
  .tab-btn { padding: 0.6rem 0.9rem; font-size: 0.85rem }
  .container { padding: 1rem }
  .match-cards { grid-template-columns: 1fr }
  .group-tables { grid-template-columns: 1fr }
  .stats-grid { grid-template-columns: repeat(2, 1fr) }
  .stadium-grid { grid-template-columns: 1fr }
  .circle-bracket-container { max-width: 100% }
  .cb-team-image { width: 28px; height: 28px }
  .modal-stats-compare { grid-template-columns: 1fr; }
}
</style>
</head>
<body>
<div class="header">
  <div class="header-inner">
    <div class="header-badge">🏆 FIFA WORLD CUP 2026</div>
    <div class="header-title">Signal <span>Room</span></div>
    <div class="date-toggle">
      <label for="date-select">📅 Tournament Date:</label>
      <select id="date-select" onchange="switchDate(this.value)">
        <option value="2026-06-24">June 24, 2026</option>
        <option value="2026-06-28">June 28, 2026</option>
        <option value="2026-06-30">June 30, 2026</option>
        <option value="full">Full Tournament</option>
      </select>
    </div>
    <div class="header-pills" id="header-pills">
      <div class="header-pill"><b id="pill-matches">54</b> Matches</div>
      <div class="header-pill"><b id="pill-goals">161</b> Goals</div>
      <div class="header-pill"><b id="pill-teams">48</b> Teams</div>
      <div class="header-pill"><b id="pill-gpm">2.98</b> GPM</div>
    </div>
  </div>
</div>
<div class="nav-tabs">
  <div class="nav-tabs-inner">
    <button class="tab-btn active" data-tab="today" onclick="switchTab('today')">📅 Today</button>
    <button class="tab-btn" data-tab="circle" onclick="switchTab('circle')">🌀 Circle Bracket</button>
    <button class="tab-btn" data-tab="groups" onclick="switchTab('groups')">📊 Groups</button>
    <button class="tab-btn" data-tab="stats" onclick="switchTab('stats')">⚽ Stats</button>
    <button class="tab-btn" data-tab="stadiums" onclick="switchTab('stadiums')">🏟️ Stadiums</button>
  </div>
</div>
<div class="container">
  <div class="section active" id="today">
    <h2 class="section-title" id="today-title"><span class="icon">📅</span> Matches</h2>
    <div class="match-cards" id="today-matches"></div>
  </div>
  <div class="section" id="circle">
    <h2 class="section-title"><span class="icon">🌀</span> Knockout Bracket</h2>
    <p class="helper-text" id="circle-helper">Hover a team to highlight its path.</p>
    <div class="circle-bracket-container" id="circle-bracket"></div>
  </div>
  <div class="section" id="groups">
    <h2 class="section-title"><span class="icon">📊</span> Group Standings</h2>
    <div class="group-tables" id="group-tables"></div>
  </div>
  <div class="section" id="stats">
    <h2 class="section-title"><span class="icon">⚽</span> Tournament Stats</h2>
    <div class="stats-grid" id="stats-grid"></div>
    <div class="top-scorers" id="top-scorers"></div>
    <div class="chart-wrap"><h2 class="section-title" style="margin-top:1.5rem"><span class="icon">📈</span> Goals by Group</h2><canvas id="goalsChart"></canvas></div>
  </div>
  <div class="section" id="stadiums">
    <h2 class="section-title"><span class="icon">🏟️</span> Stadiums</h2>
    <div class="stadium-grid" id="stadium-grid"></div>
  </div>
</div>

<!-- Modal -->
<div class="modal-overlay" id="modal-overlay" onclick="closeModal(event)">
  <div class="modal" id="modal">
    <button class="modal-close" onclick="closeModal()">&times;</button>
    <div class="modal-header" id="modal-header"></div>
    <div class="modal-body" id="modal-body"></div>
  </div>
</div>

function switchDate(dateKey) {

  const snap = SNAPSHOTS[dateKey];
  if (!snap) return;

  // Update header pills
  document.getElementById('pill-matches').textContent = snap.stats.matches_played;
  document.getElementById('pill-goals').textContent = snap.stats.total_goals;
  document.getElementById('pill-gpm').textContent = snap.stats.gpm;

  renderGroups();
  renderStats();

function switchTab(tab) {

        '<div class="pred-labels"><span>' + p.home_prob + '% H</span><span>Draw ' + p.draw_prob + '%</span><span>' + p.away_prob + '% A</span></div>' +
        '<span class="pred-confidence ' + confClass + '">Confidence: ' + p.confidence + '</span>' +
        '<div class="pred-factors">' + p.factors.map(f => '<span>• ' + f + '</span>').join('') + '</div>' +
        '</div>';
    }

    let countdownHtml = '';
    if (!m.finished) {
      countdownHtml = '<div class="countdown" id="countdown-' + m.id + '" data-date="' + m.date + '"></div>';
    }

    const card = document.createElement('div');
    card.className = 'card match-card';
    card.onclick = () => openModal(m.id);
    card.innerHTML = 
      '<div class="match-card-header"><span>' + m.date.split(' ')[0] + '</span><span>' + groupLabel + '</span>' + liveBadge + '</div>' +
      '<div class="match-teams">' +
        '<div class="match-team"><img class="match-team flag" src="' + m.home_flag + '" alt="" onerror="this.style.display='none'"><span class="match-team name">' + m.home + '</span></div>' +
        '<div class="match-score">' + scoreDisplay + '</div>' +
        '<div class="match-team" style="justify-content:flex-end"><span class="match-team name" style="text-align:right">' + m.away + '</span><img class="match-team flag" src="' + m.away_flag + '" alt="" onerror="this.style.display='none'"></div>' +
      '</div>' +
      '<div class="match-info">' + m.date.split(' ')[1] + ' • ' + m.stadium + ' - ' + m.city + '</div>' +
      importanceHtml + countdownHtml + predHtml;
    container.appendChild(card);
  });

  updateCountdowns();
}

function updateCountdowns() {
  document.querySelectorAll('.countdown').forEach(el => {
    const dateStr = el.dataset.date;
    if (!dateStr) return;
    const target = new Date(dateStr.replace(/(\d{2})\/(\d{2})\/(\d{4})/, '$3-$1-$2') + ' UTC-04:00');
    const now = new Date();
    const diff = target - now;
    if (diff <= 0) {
      el.textContent = 'Kick off!';
      return;
    }
    const hours = Math.floor(diff / 3600000);
    const mins = Math.floor((diff % 3600000) / 60000);
    if (hours > 24) {
      const days = Math.floor(hours / 24);
      el.textContent = 'Starts in ' + days + 'd ' + (hours % 24) + 'h';
    } else {
      el.textContent = 'Starts in ' + hours + 'h ' + mins + 'm';
    }
  });
}

function renderCircle() {
  const snap = SNAPSHOTS[currentDate];
  const container = document.getElementById('circle-bracket');
  const advancing = snap.advancing;

  const roundLabels = ['Round of 32', 'Round of 16', 'Quarter-Finals', 'Semi-Finals', 'Final'];
  const radii = [320, 240, 160, 100, 50];

  let svg = '<svg viewBox="0 0 800 800" xmlns="http://www.w3.org/2000/svg">';
  svg += '<circle cx="400" cy="400" r="60" fill="none" stroke="var(--fifa-gold)" stroke-width="1" opacity="0.3"/>';
  svg += '<text x="400" y="390" class="cb-center-text">🏆</text>';
  svg += '<text x="400" y="415" class="cb-center-sub">WORLD CUP 2026</text>';

  for (let i = 0; i < 5; i++) {
    svg += '<circle cx="400" cy="400" r="' + radii[i] + '" fill="none" stroke="var(--fifa-border)" stroke-width="1" stroke-dasharray="4 4" opacity="0.5"/>';
    svg += '<text x="400" y="' + (85 + i * 80) + '" class="cb-round-label">' + roundLabels[i] + '</text>';
  }

  // Place advancing teams on R32 circle
  const r = 320;
  const count = Math.max(advancing.length, 32);
  advancing.forEach((team, i) => {
    const angle = (2 * Math.PI * i) / count - Math.PI / 2;
    const x = 400 + r * Math.cos(angle);
    const y = 400 + r * Math.sin(angle);
    const strength = Math.min(100, Math.max(0, Math.round((team.elo - 1400) / 4)));
    
    svg += '<g class="cb-team" data-team="' + i + '" transform="translate(' + x + ',' + y + ')">';
    svg += '<image class="cb-team-image" x="-20" y="-20" width="40" height="40" href="' + (team.flag || '') + '" onerror="this.style.display='none'" preserveAspectRatio="xMidYMid slice" clip-path="circle(20px at 20px 20px)"/>';
    svg += '<text class="cb-team-name" y="32">' + (team.fifa || team.team.substring(0,3).toUpperCase()) + '</text>';
    svg += '<text class="cb-strength" y="40">' + strength + '</text>';
    svg += '</g>';
  });

  svg += '</svg>';
  container.innerHTML = svg;

  // Add hover effects
  setTimeout(() => {
    const teamGroups = document.querySelectorAll('.cb-team');
    teamGroups.forEach(g => {
      g.addEventListener('mouseenter', function() {
        teamGroups.forEach(other => { if (other !== g) other.style.opacity = '0.4'; });
      });
      g.addEventListener('mouseleave', function() {
        teamGroups.forEach(other => { other.style.opacity = ''; });
      });
    });
  }, 50);
}

function renderGroups() {
  const snap = SNAPSHOTS[currentDate];
  const container = document.getElementById('group-tables');
  container.innerHTML = '';

  GROUPS_LIST.forEach(group => {
    const teams = snap.standings[group];
    if (!teams || teams.length === 0) return;

    let rows = '';
    teams.forEach((t, i) => {
      const rankClass = i < 2 ? 'rank-top' : i === 2 ? 'rank-third' : 'rank-else';
      const sparkline = (t.form || []).map(r => '<span class="form-dot ' + r.toLowerCase() + '"></span>').join('');
      const strength = Math.min(100, Math.max(0, Math.round((t.elo - 1400) / 4)));
      
      rows += '<tr>' +
        '<td><span class="gt-rank ' + rankClass + '">' + (i + 1) + '</span></td>' +
        '<td><div class="gt-team"><img src="' + t.flag + '" alt="" onerror="this.style.display='none'"><span>' + t.name + '</span></div></td>' +
        '<td>' + t.MP + '</td>' +
        '<td>' + t.W + '</td>' +
        '<td>' + t.D + '</td>' +
        '<td>' + t.L + '</td>' +
        '<td>' + t.GF + '</td>' +
        '<td>' + t.GA + '</td>' +
        '<td>' + (t.GD > 0 ? '+' : '') + t.GD + '</td>' +
        '<td><b>' + t.Pts + '</b></td>' +
        '<td><div class="form-sparkline">' + sparkline + '</div></td>' +
        '<td><div class="strength-meter"><div class="strength-bar"><div class="strength-fill" style="width:' + strength + '%"></div></div><span class="strength-val">' + strength + '</span></div></td>' +
        '</tr>';
    });

    const div = document.createElement('div');
    div.className = 'card group-table';
    div.innerHTML = '<h3>Group ' + group + '</h3><table class="gt-table"><thead><tr><th>#</th><th>Team</th><th>MP</th><th>W</th><th>D</th><th>L</th><th>GF</th><th>GA</th><th>GD</th><th>Pts</th><th>Form</th><th>Str</th></tr></thead><tbody>' + rows + '</tbody></table>';
    container.appendChild(div);
  });
}

function renderStats() {
  const snap = SNAPSHOTS[currentDate];
  const stats = snap.stats;

  document.getElementById('stats-grid').innerHTML = 
    '<div class="card stat-card"><div class="stat-value">' + stats.matches_played + '</div><div class="stat-label">Matches Played</div></div>' +
    '<div class="card stat-card"><div class="stat-value">' + stats.total_goals + '</div><div class="stat-label">Total Goals</div></div>' +
    '<div class="card stat-card"><div class="stat-value">' + stats.gpm + '</div><div class="stat-label">Goals per Match</div></div>' +
    '<div class="card stat-card"><div class="stat-value">' + stats.top_scorers.length + '</div><div class="stat-label">Top Scorers Listed</div></div>';

  let scorersHtml = '<h2 class="section-title" style="margin-top:1.5rem"><span class="icon">🎯</span> Top Scorers</h2><div class="scorer-list">';
  stats.top_scorers.forEach((s, i) => {
    scorersHtml += '<div class="scorer-item"><div class="scorer-rank">' + (i + 1) + '</div><div class="scorer-name">' + s.name + '</div><div class="scorer-team">' + s.team + '</div><div class="scorer-goals">' + s.goals + '</div></div>';
  });
  scorersHtml += '</div>';
  document.getElementById('top-scorers').innerHTML = scorersHtml;

  renderChart();
}

function renderChart() {
  const snap = SNAPSHOTS[currentDate];
  const stats = snap.stats;
  const ctx = document.getElementById('goalsChart');
  if (!ctx) return;

  if (goalsChart) goalsChart.destroy();

  const labels = GROUPS_LIST;
  const data = labels.map(g => stats.group_goals[g] || 0);

  goalsChart = new Chart(ctx, {
    type: 'bar',
    data: {
      labels: labels,
      datasets: [{
        label: 'Goals',
        data: data,
        backgroundColor: '#5E17EB',
        borderColor: '#FFD700',
        borderWidth: 1,
        borderRadius: 4,
        borderSkipped: false
      }]
    },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      plugins: { legend: { display: false } },
      scales: {
        x: { ticks: { color: '#a0a0c0' }, grid: { color: 'rgba(255,255,255,0.05)' } },
        y: { ticks: { color: '#a0a0c0' }, grid: { color: 'rgba(255,255,255,0.05)' }, beginAtZero: true }
      }
    }
  });
}

function renderStadiums() {
  const container = document.getElementById('stadium-grid');
  container.innerHTML = STADIUMS.map(s => 
    '<div class="card stadium-card"><h3>' + s.name + '</h3><p>' + s.fifa_name + ' - ' + s.city + ', ' + s.country + '</p><div class="stadium-meta"><span>Capacity: ' + s.capacity.toLocaleString() + '</span><span>Region: ' + s.region + '</span></div></div>'
  ).join('');
}

function openModal(matchId) {
  const snap = SNAPSHOTS[currentDate];
  const match = snap.all_matches.find(m => m.id === matchId);
  if (!match) return;

  const header = document.getElementById('modal-header');
  const body = document.getElementById('modal-body');

  header.innerHTML = '<div class="modal-teams">' +
    '<div class="modal-team"><img src="' + match.home_flag + '" alt=""><div class="modal-team-name">' + match.home + '</div></div>' +
    '<div class="modal-vs">vs</div>' +
    '<div class="modal-team"><img src="' + match.away_flag + '" alt=""><div class="modal-team-name">' + match.away + '</div></div>' +
  '</div>';

  let bodyHtml = '<p style="color:var(--fifa-text-dim);font-size:0.85rem;margin-bottom:1rem;">' + match.date + ' • ' + match.stadium + ' - ' + match.city + '</p>';

  if (match.finished) {
    bodyHtml += '<div style="text-align:center;font-size:2rem;font-family:Oswald;font-weight:700;color:var(--fifa-gold);margin:1rem 0;">' + match.home_score + ' - ' + match.away_score + '</div>';
  }

  if (match.prediction && !match.finished) {
    const p = match.prediction;
    const confClass = p.confidence === 'High' ? 'conf-high' : p.confidence === 'Medium' ? 'conf-medium' : 'conf-low';
    bodyHtml += '<div class="modal-prediction">' +
      '<div style="font-size:0.8rem;color:var(--fifa-text-dim);margin-bottom:0.5rem;">🧠 ELO-based Prediction</div>' +
      '<div style="font-size:1.5rem;font-weight:700;text-align:center;margin-bottom:0.5rem;">Predicted: ' + p.score + '</div>' +
      '<div class="pred-bar"><div class="pred-bar-fill pred-home" style="width:' + p.home_prob + '%"></div><div class="pred-bar-fill pred-draw" style="width:' + p.draw_prob + '%"></div><div class="pred-bar-fill pred-away" style="width:' + p.away_prob + '%"></div></div>' +
      '<div class="pred-labels"><span>' + p.home_prob + '% Home</span><span>Draw ' + p.draw_prob + '%</span><span>' + p.away_prob + '% Away</span></div>' +
      '<span class="pred-confidence ' + confClass + '">Confidence: ' + p.confidence + '</span>' +
      '<div class="pred-factors">' + p.factors.map(f => '<span>• ' + f + '</span>').join('') + '</div>' +
    '</div>';
  }

  // Stats comparison
  if (match.home !== 'TBD' && match.away !== 'TBD') {
    const homeElo = match.home_elo || 1500;
    const awayElo = match.away_elo || 1500;
    const total = homeElo + awayElo;
    const homePct = Math.round((homeElo / total) * 100);
    const awayPct = 100 - homePct;

    bodyHtml += '<div class="modal-stats-compare">' +
      '<div class="compare-item"><div class="compare-label">ELO Rating</div><div class="compare-val">' + Math.round(homeElo) + '</div><div class="compare-bar"><div class="compare-bar-fill" style="width:' + homePct + '%;background:var(--fifa-purple)"></div></div></div>' +
      '<div class="compare-item"><div class="compare-label">ELO Rating</div><div class="compare-val">' + Math.round(awayElo) + '</div><div class="compare-bar"><div class="compare-bar-fill" style="width:' + awayPct + '%;background:var(--fifa-blue)"></div></div></div>' +
    '</div>';
  }

  body.innerHTML = bodyHtml;
  document.getElementById('modal-overlay').classList.add('active');
}

function closeModal(e) {
  if (!e || e.target === document.getElementById('modal-overlay') || e.target.closest('.modal-close')) {
    document.getElementById('modal-overlay').classList.remove('active');
  }
}

// Initialize
document.addEventListener('DOMContentLoaded', init);
</script>
</body>
